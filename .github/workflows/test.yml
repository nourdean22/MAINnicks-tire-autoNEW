name: Test, Lint, Build & Type Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Validate env contract (template)
        run: pnpm env:validate

      - name: TypeScript check
        run: pnpm check

      - name: Lint / format check
        run: pnpm lint

      - name: Run tests
        run: pnpm test -- --reporter=verbose 2>&1 | tee /tmp/test-output.txt
        env:
          NO_COLOR: 1

      - name: Build
        run: pnpm build 2>&1 | tee /tmp/build-output.txt

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: verify-logs
          path: |
            /tmp/test-output.txt
            /tmp/build-output.txt
          retention-days: 3

      - name: Print test summary
        if: always()
        run: tail -30 /tmp/test-output.txt 2>/dev/null || echo "No test output"
