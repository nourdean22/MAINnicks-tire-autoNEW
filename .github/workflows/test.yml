name: Test & Type Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Run tests
        run: |
          npx vitest run --reporter=verbose 2>&1 | tee /tmp/test-output.txt
        env:
          NO_COLOR: 1

      - name: Upload test output on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-output
          path: /tmp/test-output.txt
          retention-days: 3

      - name: Print test summary
        if: always()
        run: tail -30 /tmp/test-output.txt 2>/dev/null || echo "No test output"
