name: Test, Lint, Build & Type Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Validate env contract (template)
        run: |
          set -o pipefail
          pnpm env:validate 2>&1 | tee /tmp/env-output.txt

      - name: TypeScript check
        run: |
          set -o pipefail
          pnpm check 2>&1 | tee /tmp/check-output.txt

      - name: Lint / format check
        run: |
          set -o pipefail
          pnpm lint 2>&1 | tee /tmp/lint-output.txt

      - name: Run tests
        run: |
          set -o pipefail
          pnpm test -- --reporter=verbose 2>&1 | tee /tmp/test-output.txt
        env:
          NO_COLOR: 1

      - name: Build
        run: |
          set -o pipefail
          pnpm build 2>&1 | tee /tmp/build-output.txt

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: verify-logs
          path: |
            /tmp/env-output.txt
            /tmp/check-output.txt
            /tmp/lint-output.txt
            /tmp/test-output.txt
            /tmp/build-output.txt
          retention-days: 5

      - name: Print verify summary
        if: always()
        run: |
          echo "--- env ---"
          tail -20 /tmp/env-output.txt 2>/dev/null || true
          echo "--- check ---"
          tail -20 /tmp/check-output.txt 2>/dev/null || true
          echo "--- lint ---"
          tail -20 /tmp/lint-output.txt 2>/dev/null || true
          echo "--- test ---"
          tail -30 /tmp/test-output.txt 2>/dev/null || true
          echo "--- build ---"
          tail -20 /tmp/build-output.txt 2>/dev/null || true
