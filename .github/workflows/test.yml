name: Test & Type Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Run tests
        run: npx vitest run --reporter=verbose 2>&1 | tee test-output.txt || true

      - name: Check test results
        run: |
          if grep -q "Tests.*failed" test-output.txt 2>/dev/null; then
            echo "::error::Tests failed"
            tail -50 test-output.txt
            exit 1
          elif grep -q "Tests.*passed" test-output.txt 2>/dev/null; then
            echo "All tests passed"
            tail -5 test-output.txt
          else
            echo "::error::Test runner crashed"
            cat test-output.txt
            exit 1
          fi
